databases:
  - name: taevas-db
    plan: free
    databaseName: taevas_clinic
    user: taevas

services:
  # Backend API
  - type: web
    plan: free
    name: taevas-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DB_HOST
        fromDatabase:
          name: taevas-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: taevas-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: taevas-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: taevas-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: taevas-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://taevas-app.onrender.com

  # Frontend Static Site
  - type: web
    plan: free
    name: taevas-app
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    envVars:
      - key: VITE_API_BASE_URL
        value: https://taevas-api.onrender.com/api
