databases:
  - name: taevas-db
    plan: free
    databaseName: taevas_clinic
    user: taevas

services:
  - type: web
    plan: free
    name: taevas-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DB_HOST
        fromDatabase:
          name: taevas-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: taevas-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: taevas-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: taevas-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: taevas-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://taevas-app.onrender.com
