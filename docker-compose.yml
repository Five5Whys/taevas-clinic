version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: taevas-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: taevas_clinic
      POSTGRES_USER: taevas
      POSTGRES_PASSWORD: taevas123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taevas -d taevas_clinic"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: taevas-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

