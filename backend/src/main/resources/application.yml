spring:
  application:
    name: TaevasClinic

  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/taevas_clinic
    username: taevas
    password: taevas123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 6000ms

server:
  port: 8080

app:
  jwt:
    secret: b3BlbnNlc2FtZS1jbGluaWMtand0LXNlY3JldC1rZXktZm9yLXRhZXZhcy1jbGluaWMtYXBwbGljYXRpb24tMjAyNC1zZWN1cmUtdG9rZW4
    access-token-expiry: 3600000    # 1 hour in milliseconds
    refresh-token-expiry: 604800000 # 7 days in milliseconds
  sms:
    provider: mock
  cors:
    allowed-origins: http://localhost:5173,https://*.trycloudflare.com

logging:
  level:
    root: INFO
    com.taevas.clinic: INFO
